<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Rustling Grass</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主菜单界面 -->
    <div id="main-menu" class="menu-screen">
        <div class="menu-container">
            <h1 class="game-title">A Rustling Grass</h1>
            <h2 class="game-subtitle">微风草丛</h2><p id="gameVersionLabel" class="game-version">Version 0.15.0</p>
            <div class="menu-buttons">
                <button class="menu-button" onclick="showNewGameMenu()">新游戏</button>
                <button class="menu-button" onclick="showLoadGameMenu()">继续游戏</button>
                <button class="menu-button" onclick="showAbout()">关于游戏</button>
            </div>
        </div>
    </div>

    <!-- 选择存档位界面 -->
    <div id="save-slot-menu" class="menu-screen" style="display:none;">
        <div class="menu-container">
            <h2>选择存档位</h2>
            <div id="saveSlotList" class="save-slot-list"></div>
            <button class="menu-button" onclick="showMainMenu()">返回主菜单</button>
        </div>
    </div>

    <!-- 加载存档界面 -->
    <div id="load-game-menu" class="menu-screen" style="display:none;">
        <div class="menu-container">
            <h2>加载存档</h2>
            <div id="loadSlotList" class="save-slot-list"></div>
            <button class="menu-button" onclick="showMainMenu()">返回主菜单</button>
        </div>
    </div>

    <!-- 关于界面 -->
    <div id="about-menu" class="menu-screen" style="display:none;">
        <div class="menu-container">
            <h2>关于游戏</h2>
            <div id="aboutContent" class="about-text">
                <p><strong>A Rustling Grass</strong></p>
                <p>一款文字冒险RPG游戏</p>
                <p>选择你的职业，收服你的宠物伙伴</p>
                <p>在微风草丛中探索与战斗</p>
                <p>提升等级，变得更强！</p>
                <p id="aboutVersionLabel" style="margin-top: 20px;">版本: 0.15.0</p>
            </div>
            <button class="menu-button" onclick="showMainMenu()">返回</button>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-container" style="display:none;">
        <div id="game-toolbar">
            <div class="toolbar-cluster">
                <button id="returnMainMenuButton" class="toolbar-button return-button" onclick="promptReturnToMainMenu()">返回主菜单</button>
                <span id="toolbarVersionLabel" class="toolbar-version">控制台 0.15.0</span>
            </div>
            <div class="toolbar-cluster">
                <button class="toolbar-button" onclick="openMonsterDex()">图鉴大全</button>
                <button id="uiModeToggleButton" class="toolbar-button" onclick="toggleUiMode()">切换到作业台视图</button>
            </div>
        </div>
        <div id="game-layout">
            <div id="left-panel">
                <div id="logSection">
                    <h3>日志</h3>
                    <div id="logArea"></div>
                </div>
                <div id="bottom-right">
                    <h3>行动</h3>
                    <div id="buttonsArea"></div>
                    <div id="actionHelp" class="action-help">将鼠标悬停到技能按钮上，可以在这里查看说明。</div>
                </div>
            </div>

            <div id="right-panel">
                <div id="top-right">
                    <h3>队伍状态</h3>
                    <div id="teamInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="dexModal" class="overlay-modal" style="display:none;" onclick="handleDexOverlayClick(event)">
        <div class="overlay-dialog dex-dialog" role="dialog" aria-modal="true" aria-labelledby="dexModalTitle">
            <div class="overlay-header">
                <div>
                    <h3 id="dexModalTitle">图鉴大全</h3>
                    <div class="overlay-subtitle">遭遇、持有、捕获和剧情事件都会逐步补全条目。</div>
                </div>
                <button class="toolbar-button secondary-button" onclick="closeDexModal()">关闭</button>
            </div>
            <div id="dexModalContent" class="overlay-content"></div>
        </div>
    </div>

    <div id="storeModal" class="overlay-modal" style="display:none;" onclick="handleStoreOverlayClick(event)">
        <div class="overlay-dialog store-dialog" role="dialog" aria-modal="true" aria-labelledby="storeModalTitle">
            <div class="overlay-header">
                <div>
                    <h3 id="storeModalTitle">杂货铺</h3>
                    <div class="overlay-subtitle">浏览商品说明后再购买，道具与背包升级都在这里。</div>
                </div>
                <button class="toolbar-button secondary-button" onclick="closeStoreModal()">关闭</button>
            </div>
            <div id="storeModalContent" class="overlay-content"></div>
        </div>
    </div>

    <div id="petMarketModal" class="overlay-modal" style="display:none;" onclick="handlePetMarketOverlayClick(event)">
        <div class="overlay-dialog store-dialog" role="dialog" aria-modal="true" aria-labelledby="petMarketModalTitle">
            <div class="overlay-header">
                <div>
                    <h3 id="petMarketModalTitle">宠物市集</h3>
                    <div class="overlay-subtitle">按稀有度筛选可购买的风纹兽，并直接查看定位与价格。</div>
                </div>
                <button class="toolbar-button secondary-button" onclick="closePetMarketModal()">关闭</button>
            </div>
            <div id="petMarketModalContent" class="overlay-content"></div>
        </div>
    </div>

    <!-- Load scripts in correct order: data -> engine -> combat -->
    <script src="js/data.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/combat.js"></script>
    <!-- Game initialization is handled in engine.js -->
</body>
</html>
